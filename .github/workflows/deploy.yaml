# deploy.yaml

name: deploy-pwa

on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest    

    steps:
        - name: checkout
          uses: actions/checkout@v4
          with:
            path: gh-pages
            
        - name: get the latest pwa
          run: |
            pwd
            tree

            ## only needs to clone the HEAD
            git clone --depth 1 https://github.com/motetpaper/pwa-motet-clock output
            
            pwd
            tree
            ls -ra
          
        - name: Upload static files as artifact
          id: deployment
          uses: actions/upload-pages-artifact@v3
          with:
            path: output/
  deploy:
    needs: build

    permissions:
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          folder: output/
